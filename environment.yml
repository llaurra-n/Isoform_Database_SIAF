name: isoform_database
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pandas
  - numpy<2.0.0
  - scipy
  - matplotlib
  - seaborn
  - jupyter
  - jupyterlab
  - SPARQLWrapper
  - rdflib
  - rapidfuzz
  - pip
  - pip:
    - biopython<1.83
    - bio
    - biothings-client
    - mygene
    - gprofiler-official
    - structuremap
    - dataframe-image
    - matplotlib-venn
    - venn
    - statsmodels
    - plotly
    - numba
    - session-info
prefix: /opt/anaconda3
